      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes riseIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
      @keyframes scanLine{0%{left:-100%}100%{left:100%}}
      @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    
.photo-block{margin-bottom:2rem;}@media(min-width:768px){.photo-block{margin-bottom:2.5rem;}}.photo-portrait{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block;border:3px solid var(--black);}
      `;
    function useReveal(){useEffect(()=>{const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.08});setTimeout(()=>document.querySelectorAll('.reveal').forEach(el=>obs.observe(el)),60);return()=>obs.disconnect();},[])}
    const MARQUEE_TEXT=["Nathan Frampton","President & CEO","Fanimation","Indianapolis IN","Est. 1978"];
    const Footer=()=>(<footer className="footer"><div><div className="footer-name">Nathan <span>Frampton</span></div><div className="footer-sub">Indianapolis, IN &middot; President &amp; CEO &middot; Fanimation</div></div><div className="footer-right"><ul className="footer-links"><li><a href="https://www.fanimation.com" target="_blank" rel="noreferrer">Fanimation</a></li><li><a href="https://www.linkedin.com/in/nathanframpton" target="_blank" rel="noreferrer">LinkedIn</a></li></ul><div className="footer-copy">&copy; 2026 Nathan Frampton</div></div></footer>);
    const HomePage=()=>{useReveal();const marquee=[...MARQUEE_TEXT,...MARQUEE_TEXT];return(<div className="page"><section className="hero"><div className="hero-bg" aria-hidden="true">F</div><div className="hero-top"><div className="hero-tag-pill">nathanframpton.com</div><div className="hero-year">Est. 1978</div></div><div className="hero-name-block"><span className="hero-fname">Nathan</span><span className="hero-lname">Frampton</span></div><div className="hero-bottom"><div className="hero-roles"><div className="hero-role">President &amp; CEO &middot; Fanimation</div></div><div className="hero-scroll-hint"><div className="hero-scroll-line"/>Scroll</div></div></section><div className="marquee-strip" aria-hidden="true"><div className="marquee-track">{marquee.map((t,i)=>(<span key={i} className="marquee-text">{t}<span className="marquee-sep">&middot;</span></span>))}</div></div><section className="story"><div className="story-left reveal"><div className="kicker">&sect; 01 &mdash; Origin</div><h2 className="big-headline">Built<br/>to build.<br/><em>Born</em><br/>into it.</h2><div className="body-copy"><p>In 1984, my father Tom left Casablanca Fan Company &mdash; where he&apos;d run the hospitality fan division &mdash; and started Fanimation in his garage in Pasadena. He bought back a few of the designs he&apos;d created there. Those designs became the foundation of what we build today. <strong>Forty years later, that&apos;s still the idea.</strong></p><div className="pull-quote"><p>&ldquo;He built something from nothing. I&apos;m building it into something bigger.&rdquo;</p></div><p>I&apos;m now President &amp; CEO of Fanimation, headquartered in Zionsville, Indiana &mdash; where we also house the world&apos;s only <strong>antique ceiling fan museum</strong>.</p><p>Outside of Fanimation, I stay close to the lighting industry — and I’m always looking for the next thing worth building.</p></div></div><div className="story-right reveal"><div className="photo-block"><img src={PHOTO_URL} alt="Nathan Frampton" className="photo-portrait" /></div><div className="story-stat-stack">{[{n:"1990",d:"Started working at age 12"},{n:"35",d:"Years in the industry"},{n:"03",d:"Major industry awards"}].map((s,i)=>(<div className="story-stat" key={i}><div className="stat-n">{s.n}</div><div className="stat-d">{s.d.split("\n").map((l,j)=><span key={j}>{l}<br/></span>)}</div></div>))}</div></div></section><section className="fan-band reveal"><div><h2 className="fan-headline">The world&apos;s most<br/><em>design-forward</em><br/>ceiling fan company.</h2><p className="fan-body">Fanimation has been making fans that architects and designers actually want to specify since 1984. We&apos;re not a mass-market brand &mdash; we&apos;re the one you find when the other options aren&apos;t good enough.</p><a href="https://www.fanimation.com" className="fan-link" target="_blank" rel="noreferrer">Visit Fanimation</a></div><div className="fan-right"><div className="fan-big-num">40</div><div className="fan-big-num" style={{color:"rgba(240,235,225,0.12)"}}>YRS</div></div></section><section className="story" style={{borderBottom:"3px solid var(--black)"}}><div className="story-left reveal"><div className="kicker">&sect; 02 &mdash; Beyond the Company</div><h2 className="big-headline">Things I&apos;ve<br/>built that<br/><em>aren&apos;t</em><br/>fans.</h2><div className="body-copy"><p>Our lighting show had a long name nobody knew. I was chairing the Lighting Board of Governors at Dallas Market Center and decided that had to change. I led the rebrand &mdash; <strong>Lightovation</strong>. It stuck.</p><p>It&apos;s now North America&apos;s largest residential lighting trade show. One million square feet, twice a year. I&apos;m still on the board.</p><div className="pull-quote"><p>&ldquo;I chaired Citizens for a Better Zionsville, the PAC that ran the campaign to merge our town with Perry Township.&rdquo;</p></div><p>We made the case that a town of 26,000 people deserved a real mayor &mdash; not a part-time council president. Voters approved it with 60% support in 2014. It created the first mayor in Zionsville&apos;s history. The effort survived a legal challenge that went to the Indiana Supreme Court. We won.</p><p>I&apos;ve also served on the Boone County Economic Development Corporation, the Boone County Convention &amp; Visitors Bureau, the Zionsville Redevelopment Commission, and the Zionsville Chamber board.</p></div></div><div className="story-right reveal"><div className="story-stat-stack">{[{n:"2015",d:"Rebranded North America\u2019s\nlargest lighting show"},{n:"60%",d:"Voted to merge Zionsville\nwith Perry Township"},{n:"71",d:"Square miles with its\nfirst mayor to run it"}].map((s,i)=>(<div className="story-stat" key={i}><div className="stat-n">{s.n}</div><div className="stat-d">{s.d.split("\n").map((l,j)=><span key={j}>{l}<br/></span>)}</div></div>))}</div></div></section><section className="building"><div className="building-hd reveal"><div className="building-hd-title">What I&apos;m <em>Building</em></div><div className="building-hd-num">&sect; 03</div></div><div className="building-cards">{[{num:"01",tag:"Always · Ongoing",title:"Whatever’s Next",desc:""}].map((c,i)=>(<div className="b-card reveal" key={i}><div className="b-card-num">{c.num}</div><div className="b-card-tag">{c.tag}</div><div className="b-card-title">{c.title}</div><div className="b-card-desc">{c.desc}</div></div>))}</div></section><Footer/></div>);};
    const BlogPage=({navigate})=>(<div className="page"><div className="inner-hd"><h1 className="inner-title"><em>Writing</em></h1><div className="inner-meta">{BLOG_POSTS.length} posts</div></div><div className="notice"><div className="notice-dot"/><div className="notice-txt"><b>Placeholder</b> &mdash; Replace with real posts when ready.</div></div>{BLOG_POSTS.map(post=>(<div className="post-row" key={post.id} onClick={()=>navigate("post",post)}><div className="pr-meta"><div className="pr-date">{post.date}</div><div className="pr-cat">{post.category}</div></div><div className="pr-body"><div className="pr-title">{post.title}</div><div className="pr-excerpt">{post.excerpt}</div></div><div className="pr-arrow">&rarr;</div></div>))}<Footer/></div>);
    const PostPage=({post,navigate})=>(<div className="page"><div className="post-back"><button className="back-btn" onClick={()=>navigate("blog")}>&larr; Writing</button></div><div className="post-body"><div className="post-meta-row"><div className="pr-date">{post.date}</div><div className="pr-cat">{post.category}</div></div><h1 className="post-title">{post.title}</h1><div className="post-copy">{post.body.split("\n\n").map((p,i)=><p key={i}>{p}</p>)}</div></div><Footer/></div>);
    const GalleryPage=()=>{const[filter,setFilter]=useState("All");const cats=["All","Fanimation","Personal"];const items=filter==="All"?GALLERY_ITEMS:GALLERY_ITEMS.filter(p=>p.category===filter);return(<div className="page"><div className="inner-hd"><h1 className="inner-title"><em>Photos</em></h1><div className="inner-meta">{items.length} images</div></div><div className="gallery-filters"><span className="f-label">Filter</span>{cats.map(c=>(<button key={c} className={"f-pill"+(filter===c?" active":"")} onClick={()=>setFilter(c)}>{c}</button>))}</div><div className="photo-grid">{items.map(item=>(<div className="photo-cell" key={item.id}><div className="photo-inner"><div className="photo-ph">{item.label}</div></div><div className="photo-cap"><div className="photo-cap-label">{item.label}</div><div className="photo-cap-sub">{item.sub}</div></div></div>))}</div><Footer/></div>);};
    const NAV=[{key:"home",label:"Home",icon:"\u2302"},{key:"blog",label:"Writing",icon:"\u270E"},{key:"gallery",label:"Photos",icon:"\u25FB"}];
    function App(){const[page,setPage]=useState("home");const[post,setPost]=useState(null);const navigate=(to,data=null)=>{setPage(to);if(data)setPost(data);window.scrollTo({top:0,behavior:"instant"});};const active=page==="post"?"blog":page;return(<><style>{css}</style><div className="mh"><div className="mh-name">Nathan <span>Frampton</span></div></div><nav className="dn"><button className="dn-logo" onClick={()=>navigate("home")} style={{display:"flex",alignItems:"center",gap:"0"}}><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="width:28px;height:28px;vertical-align:middle;"><path d="M4 4h4.5v16.5L18 4h4.5v24H18V11.5L8.5 28H4V4zm18.5 0H27v11h-4.5V4z" fill="currentColor"/></svg></button><div className="dn-links">{NAV.map(l=>(<button key={l.key} className={"dn-btn"+(active===l.key?" active":"")} onClick={()=>navigate(l.key)}>{l.label}</button>))}</div></nav>{page==="home"&&<HomePage/>}{page==="blog"&&<BlogPage navigate={navigate}/>}{page==="post"&&post&&<PostPage post={post} navigate={navigate}/>}{page==="gallery"&&<GalleryPage/>}<nav className="tb">{NAV.map(l=>(<button key={l.key} className={"tb-btn"+(active===l.key?" active":"")} onClick={()=>navigate(l.key)}><span className="tb-icon">{l.icon}</span><span className="tb-label">{l.label}</span></button>))}</nav></>);}
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
